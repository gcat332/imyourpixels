<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#312a4a" />
    <title>แวะมายิ้มก่อน</title>
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="script.js"></script>
  </head>
  <body>
    <main id="scene" class="scene" aria-label="ร้านขนม pixel art ริมถนน">
      <img class="scene-background" src="assets/scenes/roadside-shop-1280.png" alt="" />
      <img class="car-sprite" src="assets/car-white.png" alt="รถ JDM สีขาว" />
      <button id="car-button" class="target target-car" type="button" disabled aria-label="แตะประตูรถเพื่อพัก"></button>
      <img id="driver" class="driver" src="assets/sprites/driver-harajuku.png" alt="ผู้หญิงสไตล์ฮาราจูกุผมครึ่งแดงครึ่งดำ" />
      <img class="drink-sprite" src="assets/sprites/vending-cold-drink.png" alt="" />
      <p id="cue" class="cue" role="status"></p>
      <section id="dialog-box" class="dialog-message" aria-live="polite" hidden>
        <p id="dialog-copy" class="dialog-copy"></p>
        <form id="answer-form" class="dialog-answer">
          <div id="answer-options" class="answer-options" aria-label="ตัวเลือกตอบเร็ว">
            <button type="button" class="answer-option" data-answer="เหนื่อยมาทั้งวัน">เหนื่อยมาทั้งวัน</button>
            <button type="button" class="answer-option" data-answer="มีเรื่องให้หงุดหงิดนิดหน่อย">หงุดหงิดนิดหน่อย</button>
            <button type="button" class="answer-option" data-answer="คิดมากไปหน่อย">คิดมากไปหน่อย</button>
          </div>
          <label class="sr-only" for="answer-input">วันนี้เกิดอะไรขึ้น</label>
          <div class="answer-entry">
            <input id="answer-input" class="dialog-answer-input" type="text" maxlength="120" autocomplete="off" placeholder="เล่าให้เราฟังได้นะ" required />
            <button class="dialog-submit" type="submit">บอกเรา</button>
          </div>
        </form>
      </section>
      <button id="sound-toggle" class="sound-toggle" type="button" aria-label="เปิดหรือปิดเสียงเอฟเฟกต์" aria-pressed="true">SFX</button>
      <p id="live-region" class="sr-only" aria-live="polite" aria-atomic="true"></p>
    </main>
  </body>
</html>
