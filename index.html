<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#312a4a" />
    <title>แวะมายิ้มก่อน</title>
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="script.js"></script>
  </head>
  <body>
    <main id="scene" class="scene" aria-label="ร้านขนม pixel art ริมถนน">
      <img class="scene-background" src="assets/scenes/roadside-shop-1280.png" alt="" />
      <img class="car-sprite" src="assets/car-white.png" alt="รถ JDM สีขาว" />
      <button id="car-button" class="target target-car" type="button" disabled aria-label="แตะประตูรถเพื่อพัก"></button>
      <div id="driver" class="driver" role="img" aria-label="ผู้หญิงสไตล์ฮาราจูกุอยู่ในรถ"></div>
      <p id="cue" class="cue" role="status"></p>
      <section id="dialog-box" class="dialog-message" aria-live="polite" hidden>
        <p id="dialog-copy" class="dialog-copy"></p>
        <form id="answer-form" class="dialog-answer">
          <label class="sr-only" for="answer-input">พิมพ์ตอบกลับ</label>
          <div class="answer-entry">
            <input id="answer-input" class="dialog-answer-input" type="text" maxlength="120" autocomplete="off" placeholder="พิมพ์ตอบกลับ..." required />
            <button class="dialog-submit" type="submit">ตอบกลับ</button>
            <button id="clear-answers" class="dialog-clear" type="button">ล้างคำตอบ</button>
          </div>
        </form>
      </section>
      <button id="sound-toggle" class="sound-toggle" type="button" aria-label="เปิดหรือปิดเสียงเอฟเฟกต์" aria-pressed="true">SFX</button>
      <p id="live-region" class="sr-only" aria-live="polite" aria-atomic="true"></p>
    </main>
  </body>
</html>
